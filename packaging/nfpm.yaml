name: "elastic-otel-php"
arch: "${PACKAGE_GOARCHITECTURE}"
platform: "linux"

version: ${PACKAGE_VERSION}
version_schema: semver

section: "default"
priority: "extra"

replaces:
- apm-agent-php

overrides:
  rpm:
    provides:
    - elastic-otel-php
  deb:
    provides:
    - elastic-otel-php

depends:
- bash
maintainer: "APM Team <info@elastic.co>"
description: |
  Elastic Distribution for OpenTelemetry PHP
  Git Commit: ${PACKAGE_SHA}
vendor: "Elasticsearch, Inc."
homepage: "https://github.com/elastic/elastic-otel-php"
license: "ASL 2.0"
#changelog: "changelog.yaml"
contents:
# Native extension loader (.so)
- src: /source/upstream/prod/native/_build/${BUILD_ARCHITECTURE}-release/loader/code/opentelemetry_php_distro_loader.so
  dst: /opt/elastic/elastic-otel-php/
  expand: true
# Native extension (.so per PHP version)
- src: /source/upstream/prod/native/_build/${BUILD_ARCHITECTURE}-release/extension/code/opentelemetry_php_distro_*.so
  dst: /opt/elastic/elastic-otel-php/
  expand: true
# Upstream PHP code (bootstrap, classes, scoped vendor dependencies)
- src: /source/upstream/prod/php
  dst: /opt/elastic/elastic-otel-php/php
  type: tree
  packager: rpm
- src: /source/upstream/prod/php
  dst: /opt/elastic/elastic-otel-php/php
  packager: deb
- src: /source/upstream/prod/php
  dst: /opt/elastic/elastic-otel-php/php
  packager: apk
# Elastic PHP bootstrap wrapper (entry point for the native extension)
- src: /source/elastic_prod/php/bootstrap_elastic.php
  dst: /opt/elastic/elastic-otel-php/php/bootstrap_elastic.php
# Elastic PHP classes (vendor customizations, OpAMP consumer, remote config parser)
- src: /source/elastic_prod/php/Elastic
  dst: /opt/elastic/elastic-otel-php/php/Elastic
  type: tree
  packager: rpm
- src: /source/elastic_prod/php/Elastic
  dst: /opt/elastic/elastic-otel-php/php/Elastic
  packager: deb
- src: /source/elastic_prod/php/Elastic
  dst: /opt/elastic/elastic-otel-php/php/Elastic
  packager: apk
# INI config template (upstream convention)
- src: /source/upstream/packaging/configs/opentelemetry_distro_custom_template.ini
  dst: /opt/elastic/elastic-otel-php/etc/opentelemetry-distro-custom.ini
  type: config
- src: /source/README.md
  dst: /opt/elastic/elastic-otel-php/docs/README.md
- src: /source/NOTICE
  dst: /opt/elastic/elastic-otel-php/NOTICE
- src: /source/LICENSE
  dst: /opt/elastic/elastic-otel-php/LICENSE

scripts:
  postinstall: /source/packaging/scripts/post-install.sh
  preremove: /source/packaging/scripts/before-uninstall.sh
